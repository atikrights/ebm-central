name: ebm Central CI/CD — Auto Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Read version & auto-tag
  # ─────────────────────────────────────────────────────────────────────────────
  tag-version:
    name: 🏷️ Auto-Tag Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
      already_released: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from frontend/pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep '^version:' frontend/pubspec.yaml | sed 's/version: //' | sed 's/+.*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "App Version: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists — skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "New version $TAG — will build and release."
          fi

      - name: Create & push git tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.get_version.outputs.version }}"
          git push origin "v${{ steps.get_version.outputs.version }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build Android APK
  # ─────────────────────────────────────────────────────────────────────────────
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    needs: tag-version
    if: needs.tag-version.outputs.already_released == 'false'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze for errors
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build Android APK
        run: |
          flutter build apk --release \
            --dart-define=GITHUB_TOKEN=${{ secrets.UPDATE_PAT }} \
            --dart-define=AES_KEY=${{ secrets.AES_KEY }} \
            --build-name=${{ needs.tag-version.outputs.version }} \
            --build-number=${{ github.run_number }}

      - name: Rename APK with version
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/ebm-central-${{ needs.tag-version.outputs.tag }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: frontend/build/app/outputs/flutter-apk/ebm-central-${{ needs.tag-version.outputs.tag }}.apk

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build Windows EXE
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: 🪟 Build Windows EXE
    runs-on: windows-latest
    needs: tag-version
    if: needs.tag-version.outputs.already_released == 'false'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows Release
        run: |
          flutter build windows --release `
            --dart-define=GITHUB_TOKEN=${{ secrets.UPDATE_PAT }} `
            --dart-define=AES_KEY=${{ secrets.AES_KEY }} `
            --build-name=${{ needs.tag-version.outputs.version }} `
            --build-number=${{ github.run_number }}

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Compile EXE with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" "/DMyAppVersion=${{ needs.tag-version.outputs.version }}" windows\setup.iss

      - name: Rename EXE with version
        run: |
          Rename-Item -Path "build\windows\inno\ebm-central-windows.exe" -NewName "ebm-central-${{ needs.tag-version.outputs.tag }}-windows-setup.exe"

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: frontend\build\windows\inno\ebm-central-${{ needs.tag-version.outputs.tag }}-windows-setup.exe

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4 — Publish Release
  # ─────────────────────────────────────────────────────────────────────────────
  create-release:
    name: 🚀 Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [tag-version, build-android, build-windows]
    if: |
      always() &&
      needs.tag-version.outputs.already_released == 'false' &&
      (needs.build-android.result == 'success' || needs.build-windows.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/

      - name: List release assets
        run: ls -lR release-assets/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag-version.outputs.tag }}
          name: "ebm Central ${{ needs.tag-version.outputs.tag }}"
          body: |
            ## 🚀 ebm Central ${{ needs.tag-version.outputs.tag }}
            **Automated Release** — Built by GitHub Actions.
            
            ---
            ### 📦 Download
            - Android APK included
            - Windows Setup included
            ---
            *Commit: `${{ github.sha }}` | Run: #${{ github.run_number }}*
          files: |
            release-assets/**/*.apk
            release-assets/**/*.exe
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
